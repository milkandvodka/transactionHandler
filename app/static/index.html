<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transaction Ranking Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="heading">
        <h1>Transaction Ranking Demo</h1>
        <p>Submit transactions, check a user summary, and refresh the fair ranking.</p>
      </section>

      <section class="grid">
        <form id="transaction-form" class="panel">
          <h2>Create Transaction</h2>
          <label>
            User ID
            <input id="tx-user" name="user_id" placeholder="alice_01" required minlength="3" maxlength="40" />
          </label>
          <label>
            Request ID
            <div class="inline">
              <input id="request-id" name="request_id" required minlength="8" maxlength="80" />
              <button type="button" id="new-request">New</button>
            </div>
          </label>
          <label>
            Amount
            <input id="amount" name="amount" type="number" placeholder="120.00" min="0.01" max="100000" step="0.01" required />
          </label>
          <label>
            Type
            <select id="transaction-type" name="transaction_type">
              <option value="purchase">Purchase</option>
              <option value="refund">Refund</option>
            </select>
          </label>
          <button type="submit">Submit Transaction</button>
          <button type="button" id="submit-duplicate" class="secondary">Submit Same Request Again</button>
          <pre id="transaction-output" class="output">Waiting for a transaction...</pre>
        </form>

        <section class="panel">
          <h2>User Summary</h2>
          <label>
            User ID
            <input id="summary-user" placeholder="alice_01" minlength="3" maxlength="40" />
          </label>
          <button id="load-summary" type="button">Load Summary</button>
          <pre id="summary-output" class="output">No summary loaded.</pre>
        </section>
      </section>

      <section class="panel">
        <div class="toolbar">
          <h2>Ranking</h2>
          <div class="inline compact">
            <label for="ranking-limit">Limit</label>
            <input id="ranking-limit" type="number" value="10" min="1" max="100" />
            <button id="load-ranking" type="button">Refresh</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>User</th>
                <th>Score</th>
                <th>Points</th>
                <th>Tx</th>
                <th>Total</th>
                <th>Penalty</th>
              </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
          </table>
        </div>
        <p id="ranking-formula" class="note"></p>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
